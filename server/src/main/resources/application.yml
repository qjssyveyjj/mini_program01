server:
  port: 8080

spring:
  application:
    name: server

  # 数据库：在 .env 中配置 SPRING_DATASOURCE_URL / USERNAME / PASSWORD
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 2048

file:
  upload-dir: ./uploads/

wechat:
  appid: ${WECHAT_APPID}
  secret: ${WECHAT_SECRET}

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,https://www.qjssyveyjj.asia,https://qjssyveyjj.asia

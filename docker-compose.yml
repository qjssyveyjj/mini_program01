services:
  server:
    build: ./server
    image: health-server:latest
    container_name: health-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats/users"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: health-client:latest
    container_name: health-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  uploads-data:

services:
  server:
    build: ./server
    image: health-server:latest
    container_name: health-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats/users"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: health-client:latest
    container_name: health-client
    restart: unless-stopped
    # 等待 server 容器启动即可；不阻塞于 healthcheck（后端连库失败时仍可启动前端便于排查）
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 证书（项目根目录 nginx/ 下的 pem 与 key）
      - ./nginx:/etc/nginx/ssl:ro

volumes:
  uploads-data:

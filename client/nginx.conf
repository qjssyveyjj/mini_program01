# ========== HTTP：一律跳转 HTTPS（含 IP 直接访问）==========
server {
    listen 80 default_server;
    server_name _;
    return 301 https://www.qjssyveyjj.asia$request_uri;
}

server {
    listen 80;
    server_name www.qjssyveyjj.asia qjssyveyjj.asia;
    return 301 https://$host$request_uri;
}

# ========== HTTPS：唯一对外服务入口 ==========
server {
    listen 443 ssl default_server;
    http2 on;
    server_name www.qjssyveyjj.asia qjssyveyjj.asia;

    ssl_certificate     /etc/nginx/ssl/www.qjssyveyjj.asia.pem;
    ssl_certificate_key /etc/nginx/ssl/www.qjssyveyjj.asia.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 强制浏览器仅使用 HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend "server:8080";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
